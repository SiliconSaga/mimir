deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"
  config:
    auth_enabled: false
    storage_config:
      boltdb_shipper:
        active_index_directory: /var/loki/index
        cache_location: /var/loki/cache
        shared_store: filesystem
      filesystem:
        directory: /var/loki/chunks

# Minimal block to satisfy Helm chart
loki:
  config: |
    auth_enabled: false
    limits_config:
      allow_structured_metadata: false
    storage_config:
      boltdb_shipper:
        active_index_directory: /var/loki/index
        cache_location: /var/loki/cache
      filesystem:
        directory: /var/loki/chunks
    schema_config:
      configs:
        - from: "2024-01-01"
          store: boltdb-shipper
          object_store: filesystem
          schema: v12
          index:
            prefix: index_
            period: 24h
    compactor:
      working_directory: /var/loki/compactor
    ingester:
      wal:
        dir: /var/loki/wal
      kvstore:
        store: inmemory
  storage:
    bucketNames:
      chunks: "chunks"
      ruler: "ruler"
      admin: "admin"
    filesystem:
      directory: /var/loki/chunks
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: boltdb-shipper
        object_store: filesystem
        schema: v12
        index:
          prefix: index_
          period: 24h

# Zero out all distributed/scalable mode replicas
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# Promtail configuration
promtail:
  enabled: true
  config:
    lokiAddress: "http://loki:3100/loki/api/v1/push"
    snippets:
      scrapeConfigs:
        - job_name: kubernetes-pods
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_kubernetes_io_config_mirror]
              action: drop
              regex: true
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              target_label: app
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
              target_label: instance
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
              target_label: component
            - source_labels: [__meta_kubernetes_pod_container_name]
              target_label: container
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_node_name]
              target_label: node
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: job
            - target_label: __path__
              replacement: /var/log/pods/*$1/*.log
            - source_labels: [__meta_kubernetes_pod_name, __meta_kubernetes_pod_container_name]
              separator: /
              target_label: __path__
              replacement: /var/log/pods/*$1/*.log 