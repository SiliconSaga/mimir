apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xvalkeyclusters.mimir.siliconsaga.org
spec:
  group: mimir.siliconsaga.org
  names:
    kind: XValkeyCluster
    plural: xvalkeyclusters
  claimNames:
    kind: ValkeyCluster
    plural: valkeyclusters
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                properties:
                  replicas:
                    type: integer
                    default: 3
                    description: "Number of Valkey Nodes"
                  storageSize:
                    type: string
                    default: "1Gi"
                required:
                - replicas
            required:
            - parameters
          status:
            type: object
            properties:
              endpoint:
                type: string
                description: "Valkey Connection Address"
