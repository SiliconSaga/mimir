apiVersion: kuttl.dev/v1beta1
kind: TestSuite
metadata:
  name: mimir-e2e
testDirs:
- ./tests/e2e
timeout: 300  # 5 minutes per test
parallel: 1   # Run tests sequentially (shared cluster state)
skipDelete: false  # Clean up after tests (set true for debugging)
# Note: For ephemeral CI clusters, skipDelete doesn't matter since cluster is destroyed
# For shared clusters, set skipDelete: false to clean up test resources

