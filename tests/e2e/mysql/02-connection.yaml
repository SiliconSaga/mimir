apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -e
      sleep 5
      echo "Waiting for secret mysql-e2e-test-secrets in ${NAMESPACE}..."
      for i in $(seq 1 30); do
        if kubectl get secret mysql-e2e-test-secrets -n $NAMESPACE >/dev/null 2>&1; then
          echo "Secret found."
          break
        fi
        echo "Secret not found yet, waiting..."
        sleep 2
      done
      MYSQL_PWD=$(kubectl get secret mysql-e2e-test-secrets -n $NAMESPACE -o jsonpath='{.data.root}' | base64 -d)
      kubectl run mysql-client --namespace $NAMESPACE --image=mysql:8.0 --restart=Never --env="MYSQL_PWD=$MYSQL_PWD" --command -- sh -c 'for i in $(seq 1 12); do mysql -h mysql-e2e-test -u root -e "SELECT 1;" && exit 0; echo "Retry $i..."; sleep 5; done; exit 1'
      # kubectl wait --for=jsonpath='{.status.phase}'=Succeeded is not supported in some versions/environments
      echo "Waiting for pod/mysql-client to succeed..."
      for i in $(seq 1 60); do
        PHASE=$(kubectl get pod mysql-client -n $NAMESPACE -o jsonpath='{.status.phase}')
        if [ "$PHASE" = "Succeeded" ]; then
          echo "Pod succeeded."
          break
        fi
        if [ "$PHASE" = "Failed" ]; then
          echo "Pod failed."
          kubectl logs mysql-client -n $NAMESPACE
          exit 1
        fi
        echo "Pod phase: $PHASE. Waiting..."
        sleep 2
      done
      kubectl logs mysql-client -n $NAMESPACE
